PSIjOWU5YTk0Ij5jb21wb3NpdGlvbiA6IGFwcGxpcXVlciBtw6hyZSBlbiBwcmVtaWVyLCBtYXJpIGVuc3VpdGU8L3RleHQ+Cgo8L3N2Zz4K\" alt=\"Diagramme de composition : père = mère ; mari\" style=\"max-width:100%;\">\n    <\/div>\n\n    <div class=\"two-col\">\n        <div class=\"highlight-box\">\n            <p><span class=\"badge badge-green\">Exemple — R7 (père)<\/span><\/p>\n            <p>Soit <code>mère(Alice) = Marie<\/code> et <code>mari(Marie) = Jean<\/code>.<\/p>\n            <p>Alors <code>(mère ; mari)(Alice) = mari(mère(Alice)) = mari(Marie) = Jean<\/code>.<\/p>\n            <p>Jean est bien le père d'Alice — la composition donne le résultat attendu.<\/p>\n        <\/div>\n        <div class=\"callout-info\">\n            <p><span class=\"badge badge-blue\">Analogie — R10 (frère–sœur)<\/span><\/p>\n            <p><strong>Intuition :<\/strong> <code>parent ; parent⁻¹<\/code> permet de « remonter » vers\n            un parent commun puis de « redescendre » vers tous ses enfants.\n            On exclut ensuite la paire <code>(p, p)<\/code> avec <code>\\ id_personne<\/code>\n            pour ne pas compter une personne comme sa propre sœur.<\/p>\n        <\/div>\n    <\/div>\n\n    <div class=\"reponse-zone\" data-placeholder=\"Votre réponse pour R7, R8, R9 et R10…\"><\/div>\n\n    <button class=\"solution-btn\" aria-expanded=\"false\">\n        <span class=\"btn-arrow\">▶<\/span>\n        <span class=\"btn-label\">Voir la solution<\/span>\n    <\/button>\n    <div class=\"solution\">\n        <div class=\"solution-inner\">\n            <h4 style=\"margin-top:0;\">Solution — Q4<\/h4>\n\n            <p><strong>R7 — père<\/strong><\/p>\n            <p><code>père = mère ; mari<\/code><\/p>\n            <p class=\"inline-note\">\n                La composition <code>mère ; mari<\/code> associe une personne <code>p<\/code>\n                au mari de sa mère, c'est-à-dire à son père.\n                <code>père ∈ personne ⇸ homme<\/code> (fonction partielle, car tout le monde n'a\n                pas forcément un père modélisé).\n            <\/p>\n\n            <p><strong>R8 — parent<\/strong><\/p>\n            <p><code>parent = mère ∪ père<\/code> &nbsp;=&nbsp; <code>mère ∪ (mère ; mari)<\/code><\/p>\n            <p class=\"inline-note\">\n                Un parent est soit la mère soit le père. L'union des deux relations couvre les deux cas.\n            <\/p>\n\n            <p><strong>R9 — enfant<\/strong><\/p>\n            <p><code>enfant = parent⁻¹<\/code><\/p>\n            <p class=\"inline-note\">\n                Si <code>(p, par) ∈ parent<\/code> signifie « <code>par<\/code> est un parent de <code>p<\/code> »,\n                alors <code>(par, p) ∈ parent⁻¹<\/code> signifie « <code>p<\/code> est un enfant de <code>par<\/code> ».\n                L'inversion échange les rôles.\n            <\/p>\n\n            <p><strong>R10 — frère–sœur<\/strong><\/p>\n            <p><code>frère_soeur = {(p1, p2) ∈ personne × personne | p1 ≠ p2 ∧ ∃ par ∈ personne · (p1, par) ∈ parent ∧ (p2, par) ∈ parent}<\/code><\/p>\n            <p>Ou de façon équivalente en notation relationnelle :<\/p>\n            <p><code>frère_soeur = (parent ; parent⁻¹) \\ id_personne<\/code><\/p>\n            <p class=\"inline-note\">\n                <code>parent ; parent⁻¹<\/code> donne toutes les paires de personnes partageant un parent commun\n                (y compris <code>(p, p)<\/code>). On soustrait l'identité <code>id_personne<\/code>\n                pour exclure la paire d'une personne avec elle-même.\n            <\/p>\n\n            <div class=\"callout-info\">\n                <strong>Vérification rapide pour R10 :<\/strong>\n                <ul>\n                    <li>Alice et Bob ont tous deux Marie comme mère → <code>(Alice, Marie) ∈ parent<\/code> et <code>(Bob, Marie) ∈ parent<\/code> → <code>(Alice, Bob) ∈ parent ; parent⁻¹<\/code> ✓<\/li>\n                    <li>Alice avec elle-même : <code>(Alice, Alice) ∈ parent ; parent⁻¹<\/code> mais exclu par <code>\\ id_personne<\/code> ✓<\/li>\n                <\/ul>\n            <\/div>\n        <\/div>\n    <\/div>\n\n\n    <!-- BARÈME -->\n    <div class=\"bareme\">\n        <span class=\"bareme-pts\">2<\/span>\n        <span class=\"bareme-label\">R1 — Couverture<\/span>\n        <span class=\"bareme-desc\">2 pts <code>personne = homme ∪ femme<\/code><\/span>\n\n        <span class=\"bareme-pts\">2<\/span>\n        <span class=\"bareme-label\">R2 — Disjonction<\/span>\n        <span class=\"bareme-desc\">2 pts <code>homme ∩ femme = ∅<\/code><\/span>\n\n        <span class=\"bareme-pts\">2<\/span>\n        <span class=\"bareme-label\">R3 — Type de mari<\/span>\n        <span class=\"bareme-desc\">1 pt domaine dans femme · 1 pt codomaine dans homme<\/span>\n\n        <span class=\"bareme-pts\">2<\/span>\n        <span class=\"bareme-label\">R4 — Fonction partielle<\/span>\n        <span class=\"bareme-desc\">2 pts notation <code>⇸<\/code> correcte avec les bons ensembles<\/span>\n\n        <span class=\"bareme-pts\">2<\/span>\n        <span class=\"bareme-label\">R5 — Injection partielle<\/span>\n        <span class=\"bareme-desc\">2 pts notation <code>↣<\/code> ou mention explicite que l'inverse est aussi une fonction partielle<\/span>\n\n        <span class=\"bareme-pts\">2<\/span>\n        <span class=\"bareme-label\">R6 — Mères mariées<\/span>\n        <span class=\"bareme-desc\">1 pt <code>ran(mère)<\/code> · 1 pt inclusion dans <code>dom(mari)<\/code><\/span>\n\n        <span class=\"bareme-pts\">2<\/span>\n        <span class=\"bareme-label\">R7 — Père<\/span>\n        <span class=\"bareme-desc\">2 pts composition <code>mère ; mari<\/code> dans le bon ordre<\/span>\n\n        <span class=\"bareme-pts\">2<\/span>\n        <span class=\"bareme-label\">R8 — Parent<\/span>\n        <span class=\"bareme-desc\">2 pts union correcte<\/span>\n\n        <span class=\"bareme-pts\">2<\/span>\n        <span class=\"bareme-label\">R9 — Enfant<\/span>\n        <span class=\"bareme-desc\">2 pts inversion de parent<\/span>\n\n        <span class=\"bareme-pts\">2<\/span>\n        <span class=\"bareme-label\">R10 — Frère–sœur<\/span>\n        <span class=\"bareme-desc\">1 pt parent commun · 1 pt exclusion de l'identité<\/span>\n\n        <div class=\"bareme-total\">Total : <strong>20 pts<\/strong><\/div>\n    <\/div>\n\n\n    <!-- POUR ALLER PLUS LOIN -->\n    <div class=\"pour-aller-plus-loin\">\n        <strong>Pour aller plus loin<\/strong>\n        <ul>\n            <li>La relation <code>frère_soeur<\/code> telle que définie est-elle symétrique ? Est-elle réflexive ? Justifiez.<\/li>\n            <li>Définir <code>ancêtre<\/code> — la clôture transitive de <code>parent<\/code> — en notation formelle. Quel opérateur utilise-t-on ?<\/li>\n            <li>Peut-on exprimer « grand-parent » ? Quelle composition de relations le donne-t-il ?<\/li>\n            <li>Que se passe-t-il si l'on supprime R6 ? La relation <code>père = mère ; mari<\/code> reste-t-elle bien définie ? Pourquoi R6 la renforce-t-elle intuitivement ?<\/li>\n        <\/ul>\n    <\/div>\n\n<\/body>\n<\/html>\n"};

  // Patch 1 : loadSection (iframe-based templates)
  window.loadSection = function(url, btn) {
    const frame = document.getElementById('content-frame');
    frame.setAttribute('sandbox', 'allow-scripts allow-same-origin allow-forms');
    frame.style.opacity = 0;
    try { localStorage.setItem('currentSection', url); } catch(e) {}
    setTimeout(function() {
      frame.srcdoc = SECTIONS[url] || '';
      frame.onload = function() {
        frame.style.opacity = 1;
        if (typeof applyModeToFrame === 'function') applyModeToFrame();
        if (typeof attachIframeHalo === 'function') attachIframeHalo(frame);
      };
    }, 300);
    document.querySelectorAll('.nav-btn').forEach(function(b) { b.classList.remove('active'); });
    if (btn) btn.classList.add('active');
  };

  // Patch 2 : fetch (presentation template)
  const _fetch = window.fetch;
  window.fetch = function(url, opts) {
    const file = String(url).split('/').pop().split('?')[0];
    if (SECTIONS[file]) return Promise.resolve(new Response(SECTIONS[file], { status: 200 }));
    return _fetch.call(this, url, opts);
  };
})();</script>
