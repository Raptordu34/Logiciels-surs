<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TD N°1 — Logiciels Sûrs</title>
    <link rel="stylesheet" href="./layouts/sidebar-iframe.css">
    <style>
        /* ── Toolbar flottant en haut à droite du panel contenu ── */
        .content-toolbar {
            position: absolute;
            top: 18px;
            right: 24px;
            z-index: 100;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        /* Annuler le position:absolute hérité de sidebar-iframe.css
           pour que le bouton reste dans le flux flex du toolbar */
        .content-toolbar .floating-toggle-btn {
            position: static;
        }

        /* Bouton secondaire (effacer, export) — moins proéminent */
        .toolbar-btn-secondary {
            display: flex;
            align-items: center;
            gap: 0.4rem;
            padding: 8px 14px;
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 20px;
            font-size: 0.82rem;
            font-weight: 500;
            color: var(--text-secondary, #9e9a94);
            cursor: pointer;
            font-family: inherit;
            transition: all 0.2s;
            backdrop-filter: blur(12px);
        }
        .toolbar-btn-secondary:hover {
            background: rgba(255,255,255,0.1);
            color: var(--text-primary, #f5f3f0);
            border-color: rgba(255,255,255,0.22);
        }
        .toolbar-btn-secondary.danger:hover {
            background: rgba(248,113,113,0.12);
            border-color: rgba(248,113,113,0.3);
            color: #fca5a5;
        }
        .toolbar-btn-secondary.done {
            background: rgba(110,231,183,0.12);
            border-color: rgba(110,231,183,0.3);
            color: #6ee7b7;
        }
        .toolbar-btn-secondary.done:hover {
            background: rgba(110,231,183,0.18);
            border-color: rgba(110,231,183,0.4);
        }

        /* Chronomètre */
        .timer-display {
            display: flex;
            align-items: center;
            gap: 0.4rem;
            padding: 8px 14px;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.09);
            border-radius: 20px;
            font-size: 0.82rem;
            font-weight: 600;
            color: var(--text-secondary, #9e9a94);
            font-variant-numeric: tabular-nums;
            font-family: 'Courier New', monospace;
            cursor: pointer;
            backdrop-filter: blur(12px);
            transition: all 0.2s;
            user-select: none;
        }
        .timer-display:hover { background: rgba(255,255,255,0.08); }
        .timer-display.running { color: #6ee7b7; border-color: rgba(52,211,153,0.25); }
        .timer-display.running .timer-dot { background: #6ee7b7; animation: blink 1s ease-in-out infinite; }
        .timer-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--text-secondary, #9e9a94); }
        @keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: 0.2; } }

        /* Badge "Sauvegardé" */
        .save-badge {
            font-size: 0.72rem;
            color: rgba(52,211,153,0.6);
            opacity: 0;
            transition: opacity 0.4s;
            pointer-events: none;
            white-space: nowrap;
        }
        .save-badge.visible { opacity: 1; }

        /* ── Panneau de filtres fiche ────────────────────────────────── */
        .fiche-panel {
            position: absolute;
            top: 68px;
            right: 24px;
            z-index: 200;
            background: rgba(18, 18, 22, 0.88);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 14px;
            padding: 16px 20px;
            width: 300px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.45);
            display: none;
        }
        .fiche-panel.open { display: block; }
        .fiche-panel-title {
            font-size: 0.8rem;
            font-weight: 700;
            color: var(--text-primary, #f5f3f0);
            margin: 0 0 12px;
            letter-spacing: 0.4px;
        }
        .fiche-presets {
            display: flex;
            gap: 6px;
            margin-bottom: 14px;
        }
        .fiche-preset-btn {
            flex: 1;
            padding: 5px 8px;
            border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.12);
            background: rgba(255,255,255,0.05);
            color: var(--text-secondary, #9e9a94);
            font-size: 0.73rem;
            font-weight: 600;
            cursor: pointer;
            font-family: inherit;
            transition: all 0.18s;
        }
        .fiche-preset-btn:hover, .fiche-preset-btn.active {
            background: rgba(249,115,22,0.14);
            border-color: rgba(249,115,22,0.35);
            color: #fb923c;
        }
        .fiche-checks {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 7px 16px;
            margin-bottom: 14px;
        }
        .fiche-check-label {
            display: flex;
            align-items: center;
            gap: 7px;
            font-size: 0.76rem;
            color: var(--text-secondary, #9e9a94);
            cursor: pointer;
            user-select: none;
            transition: color 0.15s;
        }
        .fiche-check-label input[type="checkbox"] {
            accent-color: #f97316;
            width: 13px;
            height: 13px;
            cursor: pointer;
            flex-shrink: 0;
        }
        .fiche-check-label:hover { color: var(--text-primary, #f5f3f0); }
        .fiche-gen-btn {
            width: 100%;
            padding: 9px;
            border-radius: 10px;
            border: none;
            background: linear-gradient(135deg, #f97316, #ea580c);
            color: #fff;
            font-size: 0.8rem;
            font-weight: 700;
            cursor: pointer;
            font-family: inherit;
            transition: opacity 0.18s;
            letter-spacing: 0.3px;
        }
        .fiche-gen-btn:hover { opacity: 0.86; }

        @media (max-width: 768px) {
            .fiche-panel {
                position: fixed;
                top: auto;
                right: 0;
                left: 0;
                bottom: 0;
                width: 100%;
                border-radius: 14px 14px 0 0;
                padding: 20px 20px 30px;
            }
        }

        /* Progress dot sur les boutons de navigation */
        .nav-btn.nav-done::after {
            content: '';
            position: absolute;
            right: 0.75rem;
            top: 50%;
            transform: translateY(-50%);
            width: 8px;
            height: 8px;
            background: #6ee7b7;
            border-radius: 50%;
            box-shadow: 0 0 6px rgba(52,211,153,0.6);
        }
    </style>
</head>
<body>
    <div class="blob blob-1"></div>
    <div class="cursor-halo" id="cursor-halo"></div>

    <div class="app-container">
        <nav class="sidebar glass-panel">
            <div class="sidebar-header">
                <h1>TD N°1</h1>
                <p>Logiciels Sûrs</p>
            </div>
            <div class="nav-links" id="nav-links">
                <button class="nav-btn" onclick="loadSection('section-exo1-ensembles.html', this)">Exercice 1 — Ensembles</button>
                <button class="nav-btn" onclick="loadSection('section-exo2-comprehension.html', this)">Exercice 2 — Compréhension</button>
                <button class="nav-btn" onclick="loadSection('section-exo3-relations.html', this)">Exercice 3 — Relations</button>
                <button class="nav-btn" onclick="loadSection('section-exo4-puissances.html', this)">Exercice 4 — Puissances</button>
                <button class="nav-btn" onclick="loadSection('section-exo5-operations.html', this)">Exercice 5 — Opérations</button>
                <button class="nav-btn" onclick="loadSection('section-exo6-parking.html', this)">Exercice 6 — Parking</button>
                <button class="nav-btn" onclick="loadSection('section-exo7-pays-langues.html', this)">Exercice 7 — Pays & Langues</button>
                <button class="nav-btn" onclick="loadSection('section-exo8-famille.html', this)">Exercice 8 — Famille</button>
            </div>
        </nav>

        <main class="main-content">
            <div class="glass-panel content-wrapper">

                <!-- Toolbar flottant — visible sur le contenu, pas dans la sidebar -->
                <div class="content-toolbar">
                    <!-- Chronomètre — clic pour démarrer/pauser, double-clic pour reset -->
                    <div class="timer-display" id="timer" onclick="toggleTimer()" ondblclick="resetTimer()" title="Clic : démarrer/pauser · Double-clic : reset">
                        <span class="timer-dot"></span>
                        <span id="timer-text">00:00</span>
                    </div>

                    <span class="save-badge" id="save-badge">✓ sauvegardé</span>

                    <!-- Effacer les réponses -->
                    <button class="toolbar-btn-secondary danger" onclick="clearAnswers()" title="Effacer toutes les réponses de cet exercice">
                        ✕ Effacer
                    </button>

                    <!-- Valider l'exercice -->
                    <button class="toolbar-btn-secondary" id="validate-btn" onclick="validateCurrentSection()" title="Marquer cet exercice comme terminé">
                        ✓ Valider
                    </button>

                    <!-- Export des notes -->
                    <button class="toolbar-btn-secondary" onclick="exportAnswers()" title="Télécharger mes réponses en texte brut">
                        ↓ Export
                    </button>

                    <!-- Générer fiche récap imprimable -->
                    <button class="toolbar-btn-secondary" id="fiche-btn" onclick="toggleFichePanel()" title="Configurer et générer une fiche récap A4 paysage imprimable">
                        ⎙ Fiche
                    </button>

                    <!-- Révéler toutes les solutions -->
                    <button class="floating-toggle-btn" id="solutions-toggle" onclick="toggleAllSolutions()">
                        <span class="btn-full">▶ Révéler toutes les solutions</span><span class="btn-short">▶ Solutions</span>
                    </button>
                </div>

                <!-- Panneau de filtres fiche récap -->
                <div class="fiche-panel" id="fiche-panel">
                    <p class="fiche-panel-title">⎙ Filtres de la fiche récap</p>
                    <div class="fiche-presets">
                        <button class="fiche-preset-btn" id="preset-all" onclick="setFichePreset('all')">Tout</button>
                        <button class="fiche-preset-btn" id="preset-revision" onclick="setFichePreset('revision')">Révision</button>
                        <button class="fiche-preset-btn" id="preset-entrainement" onclick="setFichePreset('entrainement')">Entraînement</button>
                    </div>
                    <div class="fiche-checks">
                        <label class="fiche-check-label"><input type="checkbox" id="fc-objectifs" onchange="saveFicheFilters()"> Objectifs</label>
                        <label class="fiche-check-label"><input type="checkbox" id="fc-ctx" onchange="saveFicheFilters()"> Contexte</label>
                        <label class="fiche-check-label"><input type="checkbox" id="fc-rappel" onchange="saveFicheFilters()"> Rappels</label>
                        <label class="fiche-check-label"><input type="checkbox" id="fc-exemple" onchange="saveFicheFilters()"> Exemples guidés</label>
                        <label class="fiche-check-label"><input type="checkbox" id="fc-question" onchange="saveFicheFilters()"> Énoncés</label>
                        <label class="fiche-check-label"><input type="checkbox" id="fc-solution" onchange="saveFicheFilters()"> Solutions</label>
                        <label class="fiche-check-label"><input type="checkbox" id="fc-erreur" onchange="saveFicheFilters()"> Erreurs fréquentes</label>
                        <label class="fiche-check-label"><input type="checkbox" id="fc-tip" onchange="saveFicheFilters()"> Points clés</label>
                        <label class="fiche-check-label"><input type="checkbox" id="fc-callout" onchange="saveFicheFilters()"> Infos / Analogies</label>
                        <label class="fiche-check-label"><input type="checkbox" id="fc-methode" onchange="saveFicheFilters()"> Méthodes</label>
                    </div>
                    <button class="fiche-gen-btn" onclick="launchFicheFromPanel()">⎙ Générer la fiche</button>
                </div>

                <iframe id="content-frame" src="" frameborder="0"></iframe>
            </div>
        </main>
    </div>

    <script>
        // ── Halo curseur ──────────────────────────────────────────────────
        const halo = document.getElementById('cursor-halo');
        function moveHalo(x, y) { halo.style.left = x + 'px'; halo.style.top = y + 'px'; }
        document.addEventListener('mousemove', (e) => moveHalo(e.clientX, e.clientY));
        function attachIframeHalo(frame) {
            try {
                frame.contentWindow.document.addEventListener('mousemove', (e) => {
                    const r = frame.getBoundingClientRect();
                    moveHalo(r.left + e.clientX, r.top + e.clientY);
                });
            } catch(e) {}
        }

        // ── Navigation et persistance ─────────────────────────────────────
        let solutionsRevealed = false;

        window.onload = () => {
            const buttons = document.querySelectorAll('.nav-btn');
            if (!buttons.length) return;

            const saved   = localStorage.getItem('td_currentSection');
            const first   = buttons[0].getAttribute('onclick')?.match(/'([^']+)'/)?.[1] || '';
            const savedOk = saved && [...buttons].some(b => b.getAttribute('onclick')?.includes(saved));
            const target  = savedOk ? saved : first;

            if (target) loadSection(target, null);
            buttons.forEach(b => {
                if (b.getAttribute('onclick')?.includes(target)) b.classList.add('active');
            });

            // Restaurer les indicateurs de progression
            restoreProgressDots();
        };

        function loadSection(url, button) {
            const frame = document.getElementById('content-frame');
            frame.style.opacity = 0;
            localStorage.setItem('td_currentSection', url);

            // Réinitialiser le toggle quand on change d'exercice
            solutionsRevealed = false;
            updateToggleBtn();
            
            // Mettre à jour le bouton de validation
            updateValidateBtn(localStorage.getItem('td_done_' + url));

            setTimeout(() => {
                frame.src = url;
                frame.onload = () => {
                    frame.style.opacity = 1;
                    attachIframeHalo(frame);
                    // Restaurer position de scroll
                    const pos = localStorage.getItem('td_scroll_' + url);
                    if (pos) frame.contentWindow.scrollTo(0, parseInt(pos));
                    frame.contentWindow.addEventListener('scroll', () => {
                        localStorage.setItem('td_scroll_' + url, frame.contentWindow.scrollY);
                    }, { passive: true });
                };
            }, 280);

            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            if (button) button.classList.add('active');
        }

        // ── Révéler / Masquer toutes les solutions ────────────────────────
        function toggleAllSolutions() {
            solutionsRevealed = !solutionsRevealed;
            updateToggleBtn();
            sendToFrame(solutionsRevealed ? 'show-all-solutions' : 'hide-all-solutions');
        }

        function updateToggleBtn() {
            const btn = document.getElementById('solutions-toggle');
            if (solutionsRevealed) {
                btn.innerHTML = '<span class="btn-full">▼ Masquer les solutions</span><span class="btn-short">▼ Masquer</span>';
            } else {
                btn.innerHTML = '<span class="btn-full">▶ Révéler toutes les solutions</span><span class="btn-short">▶ Solutions</span>';
            }
        }

        // ── Effacer les réponses (avec confirmation) ──────────────────────
        function clearAnswers() {
            if (!confirm('Effacer toutes vos réponses pour cet exercice ?\nCette action est irréversible.')) return;
            sendToFrame('clear-answers');
        }

        // ── Export des notes en texte ─────────────────────────────────────
        function exportAnswers() {
            sendToFrame('export-answers');
        }

        function sendToFrame(msg) {
            const frame = document.getElementById('content-frame');
            try { frame.contentWindow.postMessage(msg, '*'); } catch(e) {}
        }

        // ── Chronomètre ───────────────────────────────────────────────────
        let timerInterval = null;
        let timerSeconds  = 0;
        let timerRunning  = false;

        function toggleTimer() {
            const display = document.getElementById('timer');
            if (timerRunning) {
                clearInterval(timerInterval);
                timerRunning = false;
                display.classList.remove('running');
            } else {
                timerInterval = setInterval(() => {
                    timerSeconds++;
                    const m = String(Math.floor(timerSeconds / 60)).padStart(2, '0');
                    const s = String(timerSeconds % 60).padStart(2, '0');
                    document.getElementById('timer-text').textContent = m + ':' + s;
                }, 1000);
                timerRunning = true;
                display.classList.add('running');
            }
        }

        function resetTimer() {
            clearInterval(timerInterval);
            timerRunning  = false;
            timerSeconds  = 0;
            document.getElementById('timer-text').textContent = '00:00';
            document.getElementById('timer').classList.remove('running');
        }

        // ── Badge "sauvegardé" ────────────────────────────────────────────
        let saveBadgeTimeout = null;
        function showSaveBadge() {
            const badge = document.getElementById('save-badge');
            badge.classList.add('visible');
            clearTimeout(saveBadgeTimeout);
            saveBadgeTimeout = setTimeout(() => badge.classList.remove('visible'), 2000);
        }

        // ── Messages entrants depuis l'iframe ────────────────────────────
        window.addEventListener('message', (e) => {
            if (e.data?.type === 'answer-saved') {
                showSaveBadge();
            }
            if (e.data?.type === 'export-data') {
                downloadAnswers(e.data.text);
            }
        });

        // ── Validation manuelle ────────────────────────────
        function validateCurrentSection() {
            const sectionUrl = localStorage.getItem('td_currentSection') || '';
            const isDone = localStorage.getItem('td_done_' + sectionUrl);
            
            if (isDone) {
                // S'il est déjà validé, on donne la possibilité de l'invalider
                localStorage.removeItem('td_done_' + sectionUrl);
                document.querySelectorAll('.nav-btn').forEach(btn => {
                    const url = btn.getAttribute('onclick')?.match(/'([^']+)'/)?.[1];
                    if (url === sectionUrl) btn.classList.remove('nav-done');
                });
                updateValidateBtn(false);
            } else {
                markDone(sectionUrl);
            }
        }

        function markDone(sectionUrl) {
            if (!sectionUrl) return;
            localStorage.setItem('td_done_' + sectionUrl, '1');
            document.querySelectorAll('.nav-btn').forEach(btn => {
                const url = btn.getAttribute('onclick')?.match(/'([^']+)'/)?.[1];
                if (url === sectionUrl) btn.classList.add('nav-done');
            });
            updateValidateBtn(true);
        }

        function updateValidateBtn(isDone) {
            const btn = document.getElementById('validate-btn');
            if (btn) {
                if (isDone) {
                    btn.classList.add('done');
                    btn.innerHTML = '✓ Validé';
                } else {
                    btn.classList.remove('done');
                    btn.innerHTML = '✓ Valider';
                }
            }
        }

        function downloadAnswers(text) {
            const blob = new Blob([text], { type: 'text/plain;charset=utf-8' });
            const url  = URL.createObjectURL(blob);
            const a    = document.createElement('a');
            a.href     = url;
            a.download = 'mes-reponses.txt';
            a.click();
            URL.revokeObjectURL(url);
        }

        function restoreProgressDots() {
            document.querySelectorAll('.nav-btn').forEach(btn => {
                const url = btn.getAttribute('onclick')?.match(/'([^']+)'/)?.[1];
                if (url && localStorage.getItem('td_done_' + url)) {
                    btn.classList.add('nav-done');
                }
            });
        }

        // ── Panneau filtres fiche ─────────────────────────────────────
        const FICHE_FILTER_KEYS = ['objectifs','ctx','rappel','exemple','question','solution','erreur','tip','callout','methode'];

        function toggleFichePanel() {
            const panel = document.getElementById('fiche-panel');
            const isOpen = panel.classList.contains('open');
            if (isOpen) {
                panel.classList.remove('open');
            } else {
                loadFicheFilters();
                panel.classList.add('open');
            }
        }

        function closeFichePanel() {
            document.getElementById('fiche-panel').classList.remove('open');
        }

        document.addEventListener('click', function(e) {
            const panel = document.getElementById('fiche-panel');
            const btn   = document.getElementById('fiche-btn');
            if (panel.classList.contains('open') && !panel.contains(e.target) && e.target !== btn && !btn.contains(e.target)) {
                closeFichePanel();
            }
        });

        function setFichePreset(preset) {
            const values = {
                objectifs: true,
                ctx:       preset !== 'revision',
                rappel:    preset !== 'revision',
                exemple:   preset !== 'revision',
                question:  true,
                solution:  preset !== 'entrainement',
                erreur:    preset !== 'entrainement',
                tip:       preset !== 'entrainement',
                callout:   preset !== 'revision',
                methode:   preset !== 'revision',
            };
            FICHE_FILTER_KEYS.forEach(k => {
                const el = document.getElementById('fc-' + k);
                if (el) el.checked = values[k];
            });
            updateFichePresetBtns(preset);
            saveFicheFilters();
        }

        function updateFichePresetBtns(active) {
            ['all','revision','entrainement'].forEach(p => {
                const btn = document.getElementById('preset-' + p);
                if (btn) btn.classList.toggle('active', p === active);
            });
        }

        function saveFicheFilters() {
            const data = {};
            FICHE_FILTER_KEYS.forEach(k => {
                const el = document.getElementById('fc-' + k);
                if (el) data[k] = el.checked;
            });
            localStorage.setItem('td_fiche_filters', JSON.stringify(data));
            updateFichePresetBtns(null);
        }

        function loadFicheFilters() {
            const saved = localStorage.getItem('td_fiche_filters');
            if (!saved) { setFichePreset('all'); return; }
            try {
                const data = JSON.parse(saved);
                FICHE_FILTER_KEYS.forEach(k => {
                    const el = document.getElementById('fc-' + k);
                    if (el && k in data) el.checked = data[k];
                });
            } catch(e) { setFichePreset('all'); }
        }

        function launchFicheFromPanel() {
            saveFicheFilters();
            const filters = {};
            FICHE_FILTER_KEYS.forEach(k => {
                const el = document.getElementById('fc-' + k);
                filters[k] = el ? el.checked : true;
            });
            closeFichePanel();
            generatePrintSheet(filters);
        }
    </script>
    <script src="./print-utils.js"></script>
</body>
</html>
