<?xml version="1.0" encoding="UTF-8"?>
<svg width="580" height="205" viewBox="0 0 580 205" fill="none" xmlns="http://www.w3.org/2000/svg">

  <!-- ─── CLIENTS (boîte haute, colonne droite) ─── -->
  <rect x="455" y="10" width="118" height="140" rx="7"
    fill="rgba(158,154,148,0.06)" stroke="#9e9a94" stroke-width="1.5"/>
  <text x="514" y="86" text-anchor="middle"
    font-family="'Inter',system-ui,sans-serif" font-size="13" fill="#dedad5">CLIENTS</text>

  <!-- ─── Ligne 1 : BADGES → abonnés ─⊆─ CLIENTS ─── -->

  <!-- BADGES -->
  <rect x="10" y="22" width="100" height="38" rx="7"
    fill="rgba(214,117,86,0.08)" stroke="#d67556" stroke-width="1.5"/>
  <text x="60" y="46" text-anchor="middle"
    font-family="'Inter',system-ui,sans-serif" font-size="12" fill="#dedad5">BADGES</text>

  <!-- abonnement → (fonction totale) -->
  <line x1="110" y1="41" x2="173" y2="41" stroke="#d67556" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M 180 41 L 173 37 Q 175 41 173 45 Z" fill="#d67556"/>
  <text x="143" y="30" text-anchor="middle"
    font-family="'Inter',system-ui,sans-serif" font-size="8" fill="#d67556">abonnement (→)</text>

  <!-- abonnés -->
  <rect x="182" y="22" width="110" height="38" rx="7"
    fill="rgba(91,166,160,0.08)" stroke="#5ba6a0" stroke-width="1.5"/>
  <text x="237" y="46" text-anchor="middle"
    font-family="'Inter',system-ui,sans-serif" font-size="12" fill="#dedad5">abonnés</text>

  <!-- abonnés ⊆ CLIENTS (pointillé teal) -->
  <line x1="292" y1="41" x2="449" y2="41" stroke="#5ba6a0" stroke-width="1.5"
    stroke-linecap="round" stroke-dasharray="5 3"/>
  <path d="M 456 41 L 449 37 Q 451 41 449 45 Z" fill="#5ba6a0"/>
  <text x="372" y="30" text-anchor="middle"
    font-family="'Inter',system-ui,sans-serif" font-size="9" fill="#9e9a94">⊆</text>

  <!-- ─── Ligne 2 : réservées ⊆ PLACES →↛→ CLIENTS ─── -->

  <!-- réservées (tirets = sous-ensemble dérivé) -->
  <rect x="10" y="112" width="110" height="38" rx="7"
    fill="rgba(214,117,86,0.05)" stroke="#d67556" stroke-width="1.5" stroke-dasharray="5 3"/>
  <text x="65" y="136" text-anchor="middle"
    font-family="'Inter',system-ui,sans-serif" font-size="11" fill="#dedad5">réservées</text>

  <!-- PLACES -->
  <rect x="182" y="112" width="110" height="38" rx="7"
    fill="rgba(214,117,86,0.08)" stroke="#d67556" stroke-width="1.5"/>
  <text x="237" y="136" text-anchor="middle"
    font-family="'Inter',system-ui,sans-serif" font-size="12" fill="#dedad5">PLACES</text>

  <!-- réservées ⊆ PLACES (flèche pointillée vers PLACES) -->
  <line x1="120" y1="131" x2="176" y2="131" stroke="#d67556" stroke-width="1.5"
    stroke-linecap="round" stroke-dasharray="5 3"/>
  <path d="M 183 131 L 176 127 Q 178 131 176 135 Z" fill="#d67556"/>
  <text x="150" y="121" text-anchor="middle"
    font-family="'Inter',system-ui,sans-serif" font-size="9" fill="#9e9a94">⊆</text>

  <!-- occupation ↛ (fonction partielle) PLACES → CLIENTS diagonale -->
  <line x1="292" y1="131" x2="449" y2="75" stroke="#d67556" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M 456 75 L 449 71 Q 451 75 449 79 Z" fill="#d67556"/>
  <!-- barre transversale = partielle -->
  <line x1="366" y1="115" x2="374" y2="99" stroke="#d67556" stroke-width="2.5" stroke-linecap="round"/>
  <text x="348" y="136" text-anchor="middle"
    font-family="'Inter',system-ui,sans-serif" font-size="8" fill="#9e9a94">occupation (↛)</text>

  <!-- ─── Invariant R5 ─── -->
  <rect x="95" y="168" width="330" height="32" rx="5"
    fill="rgba(214,117,86,0.06)" stroke="#d67556" stroke-width="1" stroke-dasharray="4 3"/>
  <text x="260" y="186" text-anchor="middle"
    font-family="'Inter',system-ui,sans-serif" font-size="10" fill="#d67556">occupation[réservées] ⊆ abonnés</text>
  <text x="260" y="197" text-anchor="middle"
    font-family="'Inter',system-ui,sans-serif" font-size="8" fill="#9e9a94">R5 — invariant du système</text>

</svg>
